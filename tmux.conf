# ── Prefix: C-s ──────────────────────────────────────────────────────
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# ── Terminal ─────────────────────────────────────────────────────────
set -g default-shell /bin/bash
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ── General ──────────────────────────────────────────────────────────
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g detach-on-destroy off
set -g history-limit 50000
set -g focus-events on
set -g set-titles on
set -g set-titles-string "#S / #W"

# ── Vi copy mode ─────────────────────────────────────────────────────
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# ── Splits & windows (open in current path) ─────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (vim-tmux-navigator aware) ──────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# ── Pane resize (prefix + H/J/K/L) ──────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window navigation (prefix + C-h / C-l) ──────────────────────────
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# ── Focus mode (zoom toggle) ────────────────────────────────────────
bind f resize-pane -Z

# ── Shortcuts ────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf\; display "Reloaded!"
bind N command-prompt -p "New session:" "new-session -s '%%'"
bind R command-prompt -p "Rename session:" "rename-session %%"
bind e send-keys -R \; send-keys C-l \; clear-history

# ── Status bar ───────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-justify centre
set -g status-style "bg=colour235,fg=colour248"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[fg=colour117,bold] #S #[fg=colour248,nobold]#I:#P"
set -g status-right "#{?window_zoomed_flag,#[fg=colour214,bold] FOCUS ,}#[fg=colour248]%H:%M"

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour117,bold] #I:#W "

# ── Pane borders ─────────────────────────────────────────────────────
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour117"

# ── Plugins (TPM) ───────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'
